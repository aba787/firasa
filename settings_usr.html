<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>⚙️ الإعدادات - لوحة التحكم</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">

<!-- شريط علوي -->
<header class="bg-indigo-700 text-white p-4 flex justify-between items-center">
  <h1 class="text-xl font-bold">📊 فراسة - لوحة التحكم</h1>
  <div><span class="mr-4">مرحباً، <strong>المدير المالي</strong></span></div>
</header>

<!-- المحتوى -->
<div class="max-w-7xl mx-auto p-6 grid grid-cols-1 md:grid-cols-4 gap-6">

  <!-- القائمة الجانبية -->
  <aside class="bg-white shadow rounded-xl p-4 col-span-1">
    <ul class="space-y-4">
      <li><a href="Dashboard.html" class="block text-gray-700 hover:text-indigo-600">🏠 الصفحة الرئيسية</a></li>
      <li><a href="add-operation.html" class="block text-gray-700 hover:text-indigo-600">➕ إضافة عملية</a></li>
      <li><a href="reports_usr.html" class="block text-gray-700 hover:text-indigo-600">📑 التقارير المالية</a></li>
      <li><a href="alerts_usr.html" class="block text-gray-700 hover:text-indigo-600">⚠️ التنبيهات</a></li>
      <li><a href="accounts_lm.html" class="block text-gray-700 hover:text-indigo-600">💳 الحسابات البنكية</a></li>
      <li><a href="settings_usr.html" class="block text-gray-700 hover:text-indigo-600 font-bold">⚙️ الإعدادات</a></li>
    </ul>
  </aside>

  <!-- محتوى الصفحة -->
  <main class="col-span-3 space-y-6">

    <div class="bg-white p-6 rounded-xl shadow">
      <h2 class="text-xl font-bold mb-4">⚙️ الإعدادات</h2>
      <p>تعديل إعدادات النظام والمستخدم.</p>

      <form class="space-y-4 mt-4">
        <input type="text" placeholder="اسم المستخدم" class="w-full p-3 border rounded shadow">
        <input type="password" placeholder="كلمة المرور" class="w-full p-3 border rounded shadow">
        <div class="flex gap-4">
          <button type="submit" class="bg-indigo-600 text-white px-4 py-2 rounded hover:bg-indigo-700">حفظ الإعدادات</button>
          <button type="button" class="bg-red-600 text-white px-4 py-2 rounded hover:bg-red-700">تسجيل الخروج</button>
        </div>
      </form>

    </div>

  </main>

</div>

</body>
</html>
